<script>
// Ã Â¹ÂÃ Â¸Â«Ã Â¸Â¥Ã Â¸Â HTML partials Ã Â¹ÂÃ Â¸Â¥Ã Â¹ÂÃ Â¸Â§ init Ã Â¸Â£Ã Â¸Â°Ã Â¸ÂÃ Â¸Â
async function loadHTMLPartials() {
  const parts = [
    { id: 'login-placeholder',  file: 'html/login.html'   },
    { id: 'sidebar-placeholder',file: 'html/sidebar.html' },
    { id: 'pages-placeholder',  file: 'html/pages.html'   },
    { id: 'modals-placeholder', file: 'html/modals.html'  },
  ];
  await Promise.all(parts.map(async p => {
    try {
      const res = await fetch(p.file, {cache:'no-store'});
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const buf = await res.arrayBuffer(); const html = new TextDecoder('utf-8').decode(buf);
      document.getElementById(p.id).innerHTML = html;
    } catch(e) {
      console.error(`Failed to load ${p.file}:`, e);
    }
  }));
}

window.onload = async function() {
  // 1. Ã Â¹ÂÃ Â¸Â«Ã Â¸Â¥Ã Â¸Â HTML partials Ã Â¸ÂÃ Â¹ÂÃ Â¸Â­Ã Â¸ÂÃ Â¸ÂÃ Â¸Â¸Ã Â¸ÂÃ Â¸Â­Ã Â¸Â¢Ã Â¹ÂÃ Â¸Â²Ã Â¸Â
  await loadHTMLPartials();
  initModalClickOutside(); // Ã Â¸ÂÃ Â¹ÂÃ Â¸Â­Ã Â¸ÂÃ Â¹ÂÃ Â¸Â£Ã Â¸ÂµÃ Â¸Â¢Ã Â¸ÂÃ Â¸Â«Ã Â¸Â¥Ã Â¸Â±Ã Â¸Â HTML Ã Â¹ÂÃ Â¸Â«Ã Â¸Â¥Ã Â¸ÂÃ Â¹ÂÃ Â¸ÂªÃ Â¸Â£Ã Â¹ÂÃ Â¸Â

  // 2. Init Supabase
  supa = initSupabase();

  // 3. Ã Â¹ÂÃ Â¸ÂÃ Â¹ÂÃ Â¸Â session
  const { data: { session } } = await supa.auth.getSession();

  const loginScreen = document.getElementById('loginScreen');
  const appShell    = document.getElementById('app-shell');

  if (session) {
    try {
      const saved = sessionStorage.getItem('navasri_user');
      if (saved) {
        currentUser = JSON.parse(saved);
        const displayName = currentUser.displayName || currentUser.username || '';
        const initials = (displayName || '').trim().slice(0,2);
        document.getElementById('userAvatar').textContent       = initials || '?';
        document.getElementById('userDisplayName').textContent  = displayName.split(' ')[0] || displayName;
        loginScreen.style.display = 'none';
        appShell.style.display    = 'flex';
        resetIdleTimer();
        await loadDB();
        updateSidebarForRole();
        showPage('dashboard');
      } else {
        await supa.auth.signOut();
        loginScreen.style.display = 'flex';
      }
    } catch(e) {
      console.error('Session restore failed:', e);
      loginScreen.style.display = 'flex';
    }
  } else {
    loginScreen.style.display = 'flex';
  }

  // 4. Start UI helpers
  updateLineStatusDot();
  startClock();
};
</script>
