  <!-- ── PWA: Register Service Worker ── -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js')
          .then(function(reg) {
            console.log('[PWA] SW registered, scope:', reg.scope);

            // ── R3 Cache Purge (one-time) ──
            // เคลียร์ cache ทุกตัวที่มี 'navasri-static-v1' หรือ 'navasri-v1' หรือ 'v2'
            // เพื่อบังคับ browser โหลด CSS R3 ใหม่
            if ('caches' in window) {
              caches.keys().then(function(keys) {
                keys.forEach(function(k) {
                  // [R27-CB 15พค69] เพิ่ม v3 ใน purge list — force ลบ R26 cache
                  if (k.includes('navasri-static-v1') || k === 'navasri-v1' ||
                      k.includes('navasri-static-v2') || k === 'navasri-v2' ||
                      k.includes('navasri-static-v3') || k === 'navasri-v3') {
                    caches.delete(k).then(function() {
                      console.log('[PWA] Purged old cache:', k);
                    });
                  }
                });
              });
            }

            // ── Auto-reload เมื่อมี SW ใหม่ activate ──
            reg.addEventListener('updatefound', function() {
              var newSW = reg.installing;
              if (newSW) {
                newSW.addEventListener('statechange', function() {
                  if (newSW.state === 'activated' && navigator.serviceWorker.controller) {
                    console.log('[PWA] New SW activated, reloading...');
                    window.location.reload();
                  }
                });
              }
            });
          })
          .catch(function(err) { console.warn('[PWA] SW registration failed:', err); });

        // Force check for SW update on every page load
        navigator.serviceWorker.ready.then(function(reg) {
          reg.update();
        });
      });
    }
  </script>

<script>
async function loadHTMLPartials() {
  const parts = [
    { id: 'login-placeholder',   file: 'html/login.html' },
    { id: 'sidebar-placeholder', file: 'html/sidebar.html?v=6' },
    { id: 'pages-placeholder',   file: 'html/pages.html' },
    { id: 'modals-placeholder',  file: 'html/modals.html?v=25' },
  ];
  await Promise.all(parts.map(async p => {
    try {
      const res = await fetch(p.file, {cache:'no-store'});
      if (!res.ok) throw new Error('HTTP '+res.status);
      const buf = await res.arrayBuffer();
      const html = new TextDecoder('utf-8').decode(buf);
      document.getElementById(p.id).innerHTML = html;
    } catch(e) { console.error('Failed to load '+p.file+':', e); }
  }));
}
window.onload = async function() {
  await loadHTMLPartials();
  initModalClickOutside();
  supa = initSupabase();
  const { data: { session } } = await supa.auth.getSession();
  const loginScreen = document.getElementById('loginScreen');
  const appShell = document.getElementById('app-shell');
  if (session) {
    try {
      const saved = sessionStorage.getItem('navasri_user');
      if (saved) {
        currentUser = JSON.parse(saved);
        const displayName = currentUser.displayName || currentUser.username || '';
        const initials = (displayName || '').trim().slice(0,2);
        document.getElementById('userAvatar').textContent = initials || '?';
        document.getElementById('userDisplayName').textContent = displayName.split(' ')[0] || displayName;
        loginScreen.style.display = 'none';
        appShell.style.display = 'flex';
        resetIdleTimer();
        await loadDB();
        updateSidebarForRole();
        showPage('dashboard');
      } else {
        await supa.auth.signOut();
        loginScreen.style.display = 'flex';
      }
    } catch(e) { console.error('Session restore failed:', e); loginScreen.style.display = 'flex'; }
  } else { loginScreen.style.display = 'flex'; }
  updateLineStatusDot();
  startClock();
};
</script>

<!-- _uaPoller START -->
<script>
// Robust poller: poll until widget renders successfully (no timeout)
// Plus: re-trigger on every showPage('dashboard') call
(function() {
  var rendered = false;
  
  function tryRender() {
    try {
      var hasDb = (typeof db !== 'undefined') && db && Array.isArray(db.appointments);
      var hasFn = typeof window.renderUpcomingAppts === 'function';
      var hasEl = !!document.getElementById('dashboard-appts');
      
      if (hasDb && hasFn && hasEl) {
        var el = document.getElementById('dashboard-appts');
        // Only render if widget is currently empty/default OR shows "ไม่มีนัดหมาย"
        var currentText = el.textContent || '';
        if (currentText.length < 5 || currentText.includes('ไม่มีนัดหมาย')) {
          window.renderUpcomingAppts();
          rendered = true;
        }
      }
    } catch(e) { console.warn('uaPoll error:', e); }
  }
  
  // Start poller — runs every 1 sec forever
  var iv = setInterval(tryRender, 1000);
  
  // Hook into showPage to re-render when returning to dashboard
  // Note: showPage is a function declaration in router.js, which makes it
  // non-configurable on window. Use simple function wrap instead of Object.defineProperty.
  if (typeof window.showPage === 'function') {
    var _origShowPage = window.showPage;
    window.showPage = function() {
      var result = _origShowPage.apply(this, arguments);
      if (arguments[0] === 'dashboard') {
        setTimeout(tryRender, 100);
        setTimeout(tryRender, 500);
      }
      return result;
    };
  }
})();
</script>
<!-- _uaPoller END -->
