<!-- ══ LOGIN SCREEN ══ -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <img src="img/logo.png" alt="Navasri Logo" style="width:180px;height:auto;display:block;margin:0 auto 10px;border-radius:12px;box-shadow:0 4px 20px rgba(90,158,122,0.3);">
      <p style="font-size:12px;color:var(--text2);margin-top:4px;">Navasri Database System</p>
    </div>
    <div class="login-error" id="loginError">ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง</div>
    <div class="form-group">
      <label class="form-label">ชื่อผู้ใช้ (Username)</label>
      <input class="form-control" id="loginUser" placeholder="กรอก username" autocomplete="username" onkeydown="if(event.key==='Enter')document.getElementById('loginPass').focus()">
    </div>
    <div class="form-group">
      <label class="form-label">รหัสผ่าน (Password)</label>
      <input class="form-control" id="loginPass" type="password" placeholder="กรอก password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-primary" style="width:100%;padding:10px;font-size:14px;margin-top:4px;" onclick="doLogin()">เข้าสู่ระบบ</button>
    <div class="login-footer">
      <strong>admin</strong> / admin1234 &nbsp;·&nbsp; <strong>head</strong> / head1234<br>
      <strong>officer</strong> / officer1234 &nbsp;·&nbsp; <strong>nurse</strong> / nurse1234 &nbsp;·&nbsp; <strong>care</strong> / care1234<br>
      แผนกเบิกจ่าย: <strong>store / store1234</strong>
    </div>
  </div>
</div>
